<h1>Dog Breed AI</h1>

<input #fileInput
       type="file"
       hidden
       (change)="onFileSelected($event)">

<button (click)="fileInput.click()">
  Choose Dog Image
</button>

<div class="result-container">
  <img *ngIf="imageUrl" [src]="imageUrl" width="300">

  <div *ngIf="uploadInfo">
    <p>Breed: {{ uploadInfo[0].label }}</p>
    <p>Confidence: {{ (uploadInfo[0].score * 100).toFixed(2) }} %</p>
  </div>
</div>
