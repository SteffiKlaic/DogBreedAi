<h1>Dog Breed AI</h1>

<p>My first Angular project</p>

<button>Bild auswählen</button>

<input type="file" (change)="onFileSelected($event)">

<img *ngIf="imageUrl" [src]="imageUrl" width="300">

<div *ngIf="uploadInfo">
  <p>Dateiname: {{ uploadInfo.fileName }}</p>
  <p>Dateigröße: {{ uploadInfo.fileSize }}</p>
  <p>Dateityp: {{ uploadInfo.contentType }}</p>
</div>
